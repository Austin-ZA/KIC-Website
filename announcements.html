<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Announcements - KIC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-shell">
  <header class="page-header">
    <a href="Home.html" style="color:var(--yellow);font-weight:800;">← Home</a>
    <h1>All Announcements</h1>
  </header>
  <main class="page-main">
    <div class="page-card">
      <div id="announcementsList"></div>
    </div>
  </main>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const data = await window.KIC.getSiteData();
      const anns = data.announcements || [];
      const container = document.getElementById('announcementsList');
      if (!anns.length) {
        container.innerHTML = '<p style="color:rgba(255,255,255,0.78)">No announcements yet.</p>';
        return;
      }
      container.innerHTML = anns.map(a=>`<article style="background:rgba(255,255,255,0.03);padding:1rem;border-radius:12px;margin-bottom:1rem;border:1px solid rgba(255,255,255,0.06);">
        <h3 style="margin:0 0 0.35rem">${a.title || 'Untitled'}</h3>
        <div style="color:rgba(255,255,255,0.78);margin-bottom:0.5rem">${a.summary || a.body || ''}</div>
        <div style="color:rgba(255,255,255,0.6);font-size:0.9rem">${a.date || ''} · ${a.category || ''}</div>
      </article>`).join('');
    });
  </script>
</body>
</html>
