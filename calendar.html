<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Church Calendar - KIC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-shell">
  <header class="page-header">
    <a href="Home.html" style="color:var(--yellow);font-weight:800;">← Home</a>
    <h1>Church Calendar</h1>
  </header>
  <main class="page-main">
    <div class="page-card">
      <div id="calendarContainer"></div>
    </div>
  </main>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const data = await window.KIC.getSiteData();
      const container = document.getElementById('calendarContainer');
      const calendar = data.calendar || {};

      // Determine display month/year
      function monthNameToIndex(name){
        return ['january','february','march','april','may','june','july','august','september','october','november','december'].indexOf(name.toLowerCase());
      }

      let monthIndex, year;
      if (calendar.month) {
        const parts = calendar.month.trim().split(' ');
        if (parts.length >= 2) {
          const maybeYear = parseInt(parts[parts.length-1], 10);
          const maybeMonth = parts.slice(0, parts.length-1).join(' ');
          const idx = monthNameToIndex(maybeMonth);
          if (!isNaN(maybeYear) && idx >= 0) {
            monthIndex = idx;
            year = maybeYear;
          }
        }
      }
      const today = new Date();
      if (typeof monthIndex === 'undefined' || typeof year === 'undefined') {
        monthIndex = today.getMonth();
        year = today.getFullYear();
      }

      // parse admin event dates into YYYY-MM-DD keys and recurring weekdays
      const events = (calendar.events || []).slice();
      const eventsByKey = {};
      const recurringEventsByWeekday = {};
      function toKey(d){
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        return `${y}-${m}-${dd}`;
      }
      function parseWeekday(value) {
        if (!value) return null;
        const parts = value.trim().toLowerCase().split(/\s+/);
        if (parts.length !== 1) return null;
        const key = parts[0];
        const map = {
          sunday: 0, sun: 0,
          monday: 1, mon: 1,
          tuesday: 2, tue: 2, tues: 2,
          wednesday: 3, wed: 3,
          thursday: 4, thu: 4, thurs: 4,
          friday: 5, fri: 5,
          saturday: 6, sat: 6
        };
        return map[key] ?? null;
      }
      function tryParseDate(str){
        if (!str) return null;
        let trimmed = str.trim();
        if (!trimmed) return null;
        // YYYY-MM-DD from date picker — parse as LOCAL date, never UTC
        if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) {
          const [y, m, d] = trimmed.split('-').map(Number);
          return new Date(y, m - 1, d);
        }
        // Strip leading weekday name (e.g. "Friday, 26 June 2026")
        trimmed = trimmed.replace(/^(sunday|monday|tuesday|wednesday|thursday|friday|saturday),?\s+/i, '');
        // "26 June 2026" or "26 June" format — construct as local date
        const parts = trimmed.split(/\s+/);
        if (parts.length >= 2) {
          const day = parseInt(parts[0], 10);
          const mi = monthNameToIndex(parts[1]);
          if (!isNaN(day) && mi >= 0) {
            const yr = parts.length >= 3 ? parseInt(parts[2], 10) : NaN;
            const year = !isNaN(yr) ? yr : new Date().getFullYear();
            const date = new Date(year, mi, day);
            if (isNaN(yr) && date < new Date()) date.setFullYear(year + 1);
            return date;
          }
        }
        // Last resort — native parse (may be UTC, acceptable for ambiguous strings)
        const fallback = new Date(trimmed);
        return isNaN(fallback) ? null : fallback;
      }
      events.forEach(e => {
        const d = tryParseDate(e.date);
        if (d) {
          const k = toKey(d);
          eventsByKey[k] = eventsByKey[k] || [];
          eventsByKey[k].push(e);
          return;
        }
        const weekday = parseWeekday(e.date);
        if (weekday !== null) {
          recurringEventsByWeekday[weekday] = recurringEventsByWeekday[weekday] || [];
          recurringEventsByWeekday[weekday].push(e);
        }
      });

      // build calendar grid
      const firstDay = new Date(year, monthIndex, 1);
      const startWeekday = firstDay.getDay(); // 0=Sun
      const daysInMonth = new Date(year, monthIndex+1, 0).getDate();

      const monthTitle = firstDay.toLocaleString(undefined, { month: 'long', year: 'numeric' });
      let html = `<h2 style="color:var(--yellow);margin-bottom:0.6rem">${monthTitle}</h2>`;
      html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:0.6rem;margin-bottom:0.6rem">';
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{ html += `<div style="color:rgba(255,255,255,0.7);font-weight:700">${d}</div>` });
      html += '</div>';

      html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:0.9rem">';

      // empty cells before first day
      for (let i=0;i<startWeekday;i++) html += '<div></div>';

      for (let day=1; day<=daysInMonth; day++){
        const d = new Date(year, monthIndex, day);
        const key = toKey(d);
        let cell = `<div style="background:rgba(255,255,255,0.03);padding:0.9rem;border-radius:10px;min-height:78px;">`;
        cell += `<div style="font-weight:700;margin-bottom:0.35rem">${day}</div>`;

        // admin events for specific dates
        if (eventsByKey[key]){
          eventsByKey[key].forEach(ev=>{
            cell += `<div style="margin-top:0.35rem;padding:0.35rem;border-radius:6px;background:rgba(255,255,255,0.02);font-size:0.92rem"><strong style="display:block">${ev.title}</strong><div style="color:rgba(255,255,255,0.7);font-size:0.85rem">${ev.time||''}${ev.location ? ' · '+ev.location : ''}</div></div>`;
          });
        }

        // admin recurring weekday events
        const recurring = recurringEventsByWeekday[d.getDay()] || [];
        recurring.forEach(ev => {
          cell += `<div style="margin-top:0.35rem;padding:0.35rem;border-radius:6px;background:rgba(255,255,255,0.02);font-size:0.92rem"><strong style="display:block">${ev.title}</strong><div style="color:rgba(255,255,255,0.7);font-size:0.85rem">${ev.time||''}${ev.location ? ' · '+ev.location : ''}</div></div>`;
        });

        cell += '</div>';
        html += cell;
      }

      html += '</div>';

      container.innerHTML = html;
    });
  </script>
</body>
</html>
